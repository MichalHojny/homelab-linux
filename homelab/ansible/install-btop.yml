---
- name: Install btop on company lab servers
  hosts: company_lab
  become: true
  gather_facts: true

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install btop
      ansible.builtin.apt:
        name: btop
        state: present

    - name: Check btop path
      ansible.builtin.shell: command -v btop
      register: btop_path
      changed_when: false

    - name: Print btop path
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} has btop at {{ btop_path.stdout }}"
