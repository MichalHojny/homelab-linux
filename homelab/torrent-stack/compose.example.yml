services:
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9080:80"
      - "9081:8112"
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${RUTORRENT_WG_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=CHANGE_ME_PUBLIC_KEY
      - WIREGUARD_ENDPOINT_IP=203.0.113.10
      - WIREGUARD_ENDPOINT_PORT=51820
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - WIREGUARD_ALLOWED_IPS=0.0.0.0/0
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_INPUT_PORTS=80,8112
      - TZ=Europe/Athens

  rutorrent_hdd:
    image: linuxserver/rutorrent
    container_name: rutorrent_hdd
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      - vpn
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Athens
    volumes:
      - /home/z/rutorrent-hdd:/config
      - /mnt/hdd6t/torrents:/downloads

  vpn-deluge:
    image: qmcgaw/gluetun
    container_name: vpn-deluge
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9082:8112"
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${DELUGE_WG_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=CHANGE_ME_PUBLIC_KEY
      - WIREGUARD_ENDPOINT_IP=203.0.113.20
      - WIREGUARD_ENDPOINT_PORT=51820
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - WIREGUARD_ALLOWED_IPS=0.0.0.0/0
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_INPUT_PORTS=8112
      - TZ=Europe/Athens

  deluge_ssd:
    image: linuxserver/deluge
    container_name: deluge_ssd
    restart: unless-stopped
    network_mode: "service:vpn-deluge"
    depends_on:
      - vpn-deluge
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Athens
    volumes:
      - /home/z/deluge-ssd:/config
      - /home/z/Pobrane/Deluge-SSD:/downloads
